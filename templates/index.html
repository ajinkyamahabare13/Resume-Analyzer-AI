<!DOCTYPE html>

<html>

<head>
    <title>Resume Analyzer AI</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-4">

    <h1 class="text-center">
        Resume Analyzer AI
    </h1>

    <hr>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <label class="form-label">
            Upload Resume (PDF)
        </label>

        <input
            type="file"
            name="resume"
            class="form-control"
            accept=".pdf"
            required>

        <br>

        <div class="mb-3">

            <label class="form-label">
                Job Required Skills
            </label>

            <textarea
                name="job_skills"
                class="form-control"
                rows="5"
                placeholder="Example: Python, SQL, Machine Learning, Power BI"
                required></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">

            Analyze Resume

        </button>

    </form>

</div>
```

</div>

</body>
</html>
